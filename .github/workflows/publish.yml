name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v0.1.0, v1.2.3

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bitscrape
    permissions:
      id-token: write   # required for PyPI Trusted Publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no PYPI_API_TOKEN secret needed.
        # One-time setup: https://pypi.org/manage/account/publishing/
        #   Publisher:   GitHub Actions
        #   Repo:        Sudharsansm/Bitscrape
        #   Workflow:    publish.yml
        #   Environment: pypi
