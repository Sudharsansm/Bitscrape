name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"        # triggers on tags like v0.1.0, v1.2.3

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (no API key needed)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        run: python -m build
        # produces dist/bitscrape-X.Y.Z.tar.gz  and  dist/bitscrape-X.Y.Z-py3-none-any.whl

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no PYPI_TOKEN secret needed.
        # Set up at: https://pypi.org/manage/account/publishing/
